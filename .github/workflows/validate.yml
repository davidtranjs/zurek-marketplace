name: Validate

on:
  pull_request:
    paths:
      - "entries/**"
      - "scripts/**"
      - ".github/workflows/validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate manifests
        run: node scripts/validate.mjs
      - name: Build smoke test
        # Output (public/) is generated on deploy, not committed, so there's
        # nothing to diff — just confirm the build succeeds for this PR.
        # ZUREK_NO_AGGREGATE keeps PRs offline & deterministic: the upstream
        # aggregation (Glama, official MCP Registry) runs only on deploy, not
        # on every PR, so a flaky upstream can't fail an unrelated PR.
        run: ZUREK_NO_AGGREGATE=1 node scripts/build-registry.mjs
