name: Build & deploy registry

on:
  push:
    branches: [main]
    paths:
      - "entries/**"
      - "scripts/**"
      - ".github/workflows/build-registry.yml"

# Read-only: this workflow builds and deploys to Cloudflare Pages. It does NOT
# commit anything back to the repo — generated output (public/) is gitignored.
permissions:
  contents: read

# Never run two deploys at once; cancel an in-flight run when a newer push lands.
concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so per-entry `updatedAt` reflects the real last-touched
          # commit, not the checkout time.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build public/ (split index + legacy registry.json)
        run: node scripts/build-registry.mjs
      # Publish public/ to Cloudflare Pages (served at marketplace-data.zurek.app).
      # Requires two repo secrets:
      #   CLOUDFLARE_API_TOKEN   — token with the "Cloudflare Pages: Edit" permission
      #   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
      # One-time: create the Pages project named "zurek-marketplace" (dashboard, or
      # `wrangler pages project create zurek-marketplace`). See ARCHITECTURE.md → Serving.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=zurek-marketplace --branch=main
